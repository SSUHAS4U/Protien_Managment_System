# Render Blueprint (Infrastructure as Code)
# Docs: https://render.com/docs/blueprint-spec
#
# This declares the backend service and the ENV VAR KEYS it needs.
# Secret VALUES are intentionally NOT stored here (sync: false) so nothing
# sensitive is committed to git. Fill them either:
#   a) once in the Render dashboard when you create the blueprint, or
#   b) automatically with:  npm run render:env   (see scripts/render-sync-env.mjs)
services:
  - type: web
    name: Protien_Managment_System
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      # --- Database (Supabase Postgres) ---
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      # --- Mail (Gmail App Password) ---
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      # --- External APIs ---
      - key: SPOONACULAR_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: EXERCISE_API_KEY
        sync: false
      # --- CORS allow-list (set to your Vercel URL) ---
      - key: ALLOWED_ORIGINS
        sync: false
