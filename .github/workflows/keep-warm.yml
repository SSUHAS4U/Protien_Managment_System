name: Keep backend warm

# Pings the Render backend's dependency-free /health endpoint every 10 minutes so
# the free-tier service never spins down (Render idles after ~15 min). Fully
# automated — no third-party service, no manual URL entry, no secrets required.

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes (UTC)
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: read

concurrency:
  group: keep-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health (with retries to wake a cold instance)
        env:
          HEALTH_URL: https://protien-managment-system.onrender.com/health
        run: |
          for attempt in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$HEALTH_URL" || echo 000)
            echo "attempt $attempt -> HTTP $code"
            if [ "$code" = "200" ]; then echo "Backend is warm."; exit 0; fi
            sleep 20
          done
          echo "Health check did not return 200 after retries."
          exit 1
