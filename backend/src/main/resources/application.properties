spring.application.name=project

# application.properties
server.port=${PORT:8080}

# ==============================================================
# Secrets are injected from environment variables / .env file.
# spring-dotenv loads backend/.env locally; Render uses its own
# dashboard env vars. NEVER hardcode credentials in this file.
# ==============================================================

# JDBC Connection (Supabase Postgres)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=${DB_URL}

# Hibernate properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

logging.level.org.hibernate.SQL=INFO

# External APIs
spoonacular.api.key=${SPOONACULAR_API_KEY:}
spoonacular.api.base-url=https://api.spoonacular.com
groq.api.key=${GROQ_API_KEY:}
groq.api.base-url=https://api.groq.com/openai/v1
groq.api.model=llama-3.3-70b-versatile

# API Ninjas (exercise catalog + calories burned)
exercise.api.key=${EXERCISE_API_KEY:}
exercise.api.base-url=https://api.api-ninjas.com/v1

# CORS allowed origins (comma-separated)
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}
